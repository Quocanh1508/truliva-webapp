# =========================================================================
# TRULIVA SECURITY HEADERS CONFIGURATION FOR NGINX
# =========================================================================
# Copy các dòng dưới đây vào khối cấu hình server (listen 443 ssl) của bạn.
# Hoặc lưu tệp này thành /etc/nginx/conf.d/security-headers.conf và chèn:
# include conf.d/security-headers.conf;
# =========================================================================

# 1. Strict-Transport-Security (HSTS)
# Bắt buộc trình duyệt truy cập bằng HTTPS trong vòng 1 năm (31536000 giây),
# áp dụng cho cả các subdomains và đăng ký preload list toàn cầu.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# 2. Permissions-Policy
# Giới hạn hoặc cấm hẳn các API nguy hiểm của trình duyệt mà ứng dụng của bạn 
# không cần dùng tới, ngăn bot hoặc bên thứ 3 tự ý bật micro, camera, định vị.
add_header Permissions-Policy "geolocation=(), midi=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), fullscreen=(self), payment=()" always;

# 3. Cross-Origin-Opener-Policy (COOP)
# Ngăn chặn các cửa sổ khác (như popup quảng cáo, tab khác) truy cập thông tin 
# window.opener của ứng dụng của bạn.
add_header Cross-Origin-Opener-Policy "same-origin" always;

# 4. Cross-Origin-Resource-Policy (CORP)
# Chỉ cho phép ứng dụng của bạn tải các tài nguyên (hình ảnh, scripts...) 
# đến từ cùng một domain gốc.
add_header Cross-Origin-Resource-Policy "same-origin" always;

# 5. X-Frame-Options
# Ngăn chặn tấn công Clickjacking (không cho phép website khác nhúng app qua iframe)
add_header X-Frame-Options "SAMEORIGIN" always;

# 6. X-Content-Type-Options
# Ngăn chặn trình duyệt đoán mò định dạng file (MIME-sniffing), chống mã độc 
add_header X-Content-Type-Options "nosniff" always;

# 7. X-XSS-Protection
# Bật tính năng lọc mã độc XSS của trình duyệt
add_header X-XSS-Protection "1; mode=block" always;

# 8. Referrer-Policy
# Kiểm soát lượng thông tin URL gốc được gửi đi khi người dùng chuyển hướng
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
