name: Deploy Truliva System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "=== Starting Automatic Deployment ==="
            cd /var/www/truliva
            
            echo "=== 1. Pulling latest code ==="
            git pull origin main
            
            echo "=== 2. Installing Backend & Frontend Dependencies ==="
            npm install
            
            echo "=== 3. Building Frontend and Backend ==="
            npm run build
            
            echo "=== 4. Restarting Backend Server ==="
            pm2 restart truliva-backend
            
            echo "=== CI/CD Deployment Successfully Completed! ==="
