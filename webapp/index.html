<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="alternate icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truliva App - Hệ thống quản lý dịch vụ và kỹ thuật viên</title>
    <meta name="description" content="Truliva App - Hệ thống quản lý, điều phối dịch vụ kỹ thuật và báo cáo nghiệm thu chuyên nghiệp dành cho đội ngũ kỹ thuật viên Truliva." />

    <!-- Open Graph / Facebook / Zalo -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Truliva App - Hệ thống quản lý dịch vụ và kỹ thuật viên" />
    <meta property="og:description" content="Truliva App - Hệ thống quản lý, điều phối dịch vụ kỹ thuật và báo cáo nghiệm thu chuyên nghiệp dành cho đội ngũ kỹ thuật viên Truliva." />
    <meta property="og:image" content="https://trulivaofficial.com/logo.png" />
    <meta property="og:url" content="https://trulivaofficial.com" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Truliva KTV" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registered', reg))
            .catch((err) => console.error('Service Worker registration failed', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
